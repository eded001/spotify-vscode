<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spotify Player - Conectado!</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Inter, system-ui, sans-serif;
      background: #0a0a0f;
      color: #f0f0f5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
      position: relative;
      overflow: hidden;
    }

    /* orbe de fundo sutil */
    body::before {
      content: '';
      position: fixed;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(30, 215, 96, 0.15) 0%, transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    .card {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      max-width: 420px;
      width: 100%;
    }

    .logo {
      width: 88px;
      height: 88px;
      animation: pulse 3s ease-in-out infinite;
      filter: drop-shadow(0 0 24px rgba(30, 215, 96, 0.5));
    }

    @keyframes pulse {

      0%,
      100% {
        transform: scale(1);
        filter: drop-shadow(0 0 24px rgba(30, 215, 96, 0.5));
      }

      50% {
        transform: scale(1.06);
        filter: drop-shadow(0 0 40px rgba(30, 215, 96, 0.8));
      }
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(30, 215, 96, 0.12);
      border: 1px solid rgba(30, 215, 96, 0.3);
      border-radius: 999px;
      padding: 6px 16px;
      font-size: 0.78rem;
      font-weight: 600;
      color: #1ED760;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .badge .dot {
      width: 7px;
      height: 7px;
      background: #1ED760;
      border-radius: 50%;
      animation: blink 1.8s ease-in-out infinite;
    }

    @keyframes blink {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.2;
      }
    }

    h1 {
      font-size: 1.9rem;
      font-weight: 800;
      letter-spacing: -0.04em;
      line-height: 1.15;
    }

    .sub {
      font-size: 1rem;
      color: #8888a0;
      line-height: 1.65;
    }

    .divider {
      width: 40px;
      height: 2px;
      background: linear-gradient(90deg, transparent, rgba(30, 215, 96, 0.5), transparent);
      border-radius: 999px;
    }

    .portfolio-link {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.12);
      color: #f0f0f5;
      font-size: 0.9rem;
      font-weight: 500;
      padding: 13px 24px;
      border-radius: 999px;
      text-decoration: none;
      transition: border-color 0.2s, background 0.2s, transform 0.15s;
    }

    .portfolio-link:hover {
      border-color: rgba(30, 215, 96, 0.4);
      background: rgba(30, 215, 96, 0.06);
      transform: translateY(-2px);
    }

    .portfolio-link svg {
      flex-shrink: 0;
      color: #1ED760;
    }

    .close-tip {
      font-size: 0.78rem;
      color: #555570;
    }

    @keyframes pulse-logo {

      0%,
      100% {
        transform: scale(1);
        box-shadow: 0 0 30px rgba(30, 215, 96, 0.4);
      }

      50% {
        transform: scale(1.05);
        box-shadow: 0 0 50px rgba(30, 215, 96, 0.7);
      }
    }
  </style>
</head>
